    <div class="container">
        <div class="search-box">

        <div id="faqList">

            <!-- PREGUNTA 2: Galería de imágenes + PDF -->

                </button>
                <div class="faq-answer">
                    <div class="answer-content">
                        <p>Revisa los requisitos visuales:</p>

                        <!-- Galería de imágenes locales -->
                        <div class="image-gallery">
                            <div class="gallery-card" onclick="openImageModal('assets/images/imagen.jpeg')">
                                <img src="assets/images/imagen.jpeg" alt="Requisitos" loading="lazy">
                                <span class="gallery-title">Documentos</span>
                            </div>
                            <div class="gallery-card" onclick="openImageModal('assets/images/imagen.jpeg')">
                                <img src="assets/images/imagen.jpeg" alt="Flujograma" loading="lazy">
                                <span class="gallery-title">Proceso</span>
                            </div>
                        </div>

                            <h4><i class="fas fa-paperclip"></i> Reglamento:</h4>
                            <div class="doc-buttons">
                                <button class="btn-doc btn-pdf"

                                    <i class="fas fa-file-pdf"></i> Ver Reglamento

    <!-- MODAL PARA PDF (usando PDF.js desde CDN) -->
    <div id="pdfModal" class="modal">
        <div class="modal-content modal-pdf">
            <div class="modal-header">
                <h3 id="pdfModalTitle">Vista Previa</h3>
                <button class="close-btn" onclick="closePDFModal()">&times;</button>
            </div>
            <div class="modal-body" id="pdfViewerContainer">
                <!-- PDF.js renderizará aquí -->
            </div>
            <div class="pdf-controls">
                <button id="prevPage">❮ Anterior</button>
                <span id="pageNum">Página 1</span>
                <button id="nextPage">Siguiente ❯</button>
            </div>
        </div>
    </div>

    <!-- MODAL PARA IMÁGENES (Lightbox) -->
    <div id="imageModal" class="modal image-modal">
        <span class="image-close" onclick="closeImageModal()">&times;</span>
        <img class="image-modal-content" id="imageModalImg">
        <div class="image-caption" id="imageModalCaption"></div>
    </div>

    <!-- PDF.js desde CDN (para previsualizar PDFs localmente) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        // Configurar worker de PDF.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
